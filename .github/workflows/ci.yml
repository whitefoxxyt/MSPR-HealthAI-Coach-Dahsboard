name: CI - FRONT

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (oxlint + eslint)
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Lint
        run: npm run lint

  type-check:
    name: Vérification des types (vue-tsc)
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Type-check
        run: npm run type-check

  test:
    name: Tests unitaires (Vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Tests unitaires
        run: npm run test:unit -- --run

  e2e:
    name: Tests e2e (Cypress)
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Cache binaire Cypress
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            cypress-${{ runner.os }}-

      - name: Installation du binaire Cypress
        run: npx cypress install

      - name: Build de l'application (mode test)
        run: npm run build:test

      - name: Tests e2e Cypress
        run: npx start-server-and-test 'vite preview --port 4173' http://localhost:4173 'cypress run'

      - name: Upload des screenshots Cypress en cas d'échec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

  publish:
    name: Publication de l'image Docker
    needs: [lint, type-check, test, e2e]
    if: github.event_name == 'push'
    uses: ./.github/workflows/docker-publish.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
