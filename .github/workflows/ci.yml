name: CI - FRONT

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (oxlint + eslint)
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Lint
        run: npm run lint

  type-check:
    name: Vérification des types (vue-tsc)
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Type-check
        run: npm run type-check

  test:
    name: Tests unitaires (Vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Tests unitaires
        run: npm run test:unit -- --run

  publish:
    name: Publication de l'image Docker
    needs: [lint, type-check, test]
    if: github.event_name == 'push'
    uses: ./.github/workflows/docker-publish.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
